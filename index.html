# রোশনি জুয়েলার্স — অ্যাপ প্রজেক্ট ব্লুপ্রিন্ট
**Roshni Juelers — App Project Blueprint**

---

> এই ডকুমেন্টটি রোশনি জুয়েলার্স-এর জন্য তৈরি করা মোবাইল অ্যাপ্লিকেশনের সম্পূর্ণ পরিকল্পনা, ফিচার বিবরণ এবং কারিগরি রূপরেখা।

---

## ১. প্রজেক্ট পরিচিতি

| বিষয় | বিবরণ |
|---|---|
| **ব্যবসার নাম** | রোশনি জুয়েলার্স (Roshni Juelers) |
| **অ্যাপের ধরন** | মোবাইল অ্যাপ (Android + iOS) |
| **মূল উদ্দেশ্য** | সোনা ও নগদ টাকার হিসাব ডিজিটাল পদ্ধতিতে পরিচালনা |
| **ব্যবহারকারী** | ব্যবসার মালিক (একক ব্যবহারকারী, একাধিক ডিভাইস) |
| **ভাষা** | বাংলা ও English (Settings থেকে পরিবর্তনযোগ্য) |
| **ডেটা সংরক্ষণ** | অনলাইন (Firebase) + অফলাইন (ফোনে) উভয়ই |

---

## ২. কেন এই অ্যাপ দরকার

রোশনি জুয়েলার্স এতদিন নোটবুকে হাতে লিখে হিসাব রাখতেন। এতে সমস্যা ছিল:

- **ভুলের সম্ভাবনা:** হাতে লেখায় গণনায় ভুল হওয়া স্বাভাবিক
- **খোঁজা কঠিন:** কোনো নির্দিষ্ট ব্যক্তির হিসাব বের করতে অনেক সময় লাগত
- **নিরাপত্তার অভাব:** নোটবুক হারিয়ে গেলে সব হিসাব শেষ
- **সারসংক্ষেপ পাওয়া যেত না:** মোট কত টাকা আছে, কার কাছে কত পাওনা — এটা তাৎক্ষণিকভাবে জানা যেত না

এই অ্যাপ সেই সমস্যাগুলো সম্পূর্ণভাবে সমাধান করবে।

---

## ৩. অ্যাপের মূল নীতি

```
১. Local First     — ইন্টারনেট ছাড়াও সব কাজ চলবে
২. Data Integrity  — কোনো এন্ট্রি কখনো হারাবে না
৩. Audit Trail     — প্রতিটা পরিবর্তনের ইতিহাস থাকবে
৪. Single User     — একজনের ব্যবসা, একটাই অ্যাকাউন্ট
                     তবে একাধিক ডিভাইসে ব্যবহার করা যাবে
৫. Simplicity      — কম ক্লিকে দ্রুত এন্ট্রি
৬. Expandable      — ভবিষ্যতে নতুন ফিচার যোগ করা সহজ হবে
```

---

## ৪. অ্যাপের প্রধান বিভাগসমূহ

অ্যাপটিতে মোট **৪টি প্রধান অংশ** থাকবে, যেগুলো নিচের নেভিগেশন থেকে সহজেই যাওয়া যাবে:

| নম্বর | বিভাগ | কাজ |
|---|---|---|
| ১ | **ড্যাশবোর্ড** | সব হিসাবের সারসংক্ষেপ এক নজরে |
| ২ | **লেনদেন** | নগদ ও সোনার সব লেনদেন দেখা ও যোগ করা |
| ৩ | **পরিচিতি** | প্রতিটি ব্যক্তির আলাদা হিসাব |
| ৪ | **সেটিংস** | ভাষা, থিম, নিরাপত্তা ইত্যাদি |

---

## ৫. নগদ টাকার হিসাব (Cash Module)

### ৫.১ মূলধন কীভাবে তৈরি হয়

রোশনি জুয়েলার্স-এর ব্যবসায় টাকা আসে দুইভাবে:

**ক) নিজের টাকা বিনিয়োগ:**
মালিক নিজে তার সঞ্চয় থেকে ব্যবসায় টাকা ঢালেন।

**খ) অন্যের কাছ থেকে নেওয়া টাকা:**
বিভিন্ন মানুষের কাছ থেকে টাকা নিয়ে ব্যবসা পরিচালনা করা হয়। এই টাকা মূলধনে যোগ হয়।

```
উদাহরণ:
নিজস্ব বিনিয়োগ     → ৩,০০,০০০ টাকা
রহিম সাহেব (৩ বার) → ২,০০,০০০ টাকা
করিম সাহেব (১ বার) →    ৫০,০০০ টাকা
─────────────────────────────────────
মোট মূলধন          → ৫,৫০,০০০ টাকা
```

### ৫.২ মূলধন থেকে টাকা বিতরণ

মূলধন থেকে অন্যদেরকে টাকা দেওয়া হয় (ধার/লেনদেন)। এই টাকা মূলধন থেকে বাদ যায়।

```
উদাহরণ:
মোট মূলধন              → ১০,০০,০০০ টাকা
আলম সাহেবকে দেওয়া     →  ২,০০,০০০ টাকা (বাদ)
সালমাকে দেওয়া          →  ১,৫০,০০০ টাকা (বাদ)
জামালকে দেওয়া          →  ২,৫০,০০০ টাকা (বাদ)
─────────────────────────────────────────────
হাতে বাকি মূলধন         →  ৪,০০,০০০ টাকা ✅
```

### ৫.৩ Dashboard-এ নগদ হিসাব কেমন দেখাবে

ড্যাশবোর্ডে **২টি কার্ড** থাকবে:

| কার্ড | কী দেখাবে |
|---|---|
| **মোট মূলধন কার্ড** | নিজের + সবার কাছ থেকে নেওয়া মোট টাকা |
| **হাতে আছে কার্ড** | মূলধন থেকে বিতরণের পর বাকি টাকা (নেগেটিভ হলে লাল রঙে দেখাবে) |

> **গুরুত্বপূর্ণ:** যদি বিতরণ মূলধনের বেশি হয়ে যায়, তাহলে "হাতে আছে" কার্ডটি **লাল রঙে** দেখাবে — এটা সতর্কতা চিহ্ন।

### ৫.৪ নগদ লেনদেনের ধরন

অ্যাপে ৪ ধরনের নগদ লেনদেন এন্ট্রি দেওয়া যাবে:

| ধরন | অর্থ |
|---|---|
| **মূলধন এসেছে** | কারো কাছ থেকে টাকা নেওয়া হয়েছে |
| **টাকা দেওয়া হয়েছে** | কাউকে টাকা দেওয়া হয়েছে |
| **ফেরত এসেছে** | যাকে দেওয়া হয়েছিল সে ফেরত দিয়েছে |
| **ফেরত দিয়েছি** | যার কাছ থেকে নেওয়া হয়েছিল তাকে ফেরত দেওয়া হয়েছে |

## ৬. সোনার হিসাব (Gold Module)

### ৬.১ সোনার হিসাবের মূল নীতি

সোনার হিসাবে **ওজন (গ্রাম)** হলো প্রধান একক। টাকার মূল্য শুধু রেফারেন্সের জন্য রাখা হয় — এটা মূল নগদ মূলধনকে প্রভাবিত করে **না**।

> **কেন আলাদা?** কারণ সোনার ব্যবসা নগদ টাকার ব্যবসা থেকে আলাদা। সোনা আসা-যাওয়ার হিসাব গ্রামে হয়, নগদ টাকার সাথে এটি মিশবে না।

### ৬.২ সোনার পুঁজি

বিভিন্ন মানুষের কাছ থেকে যত গ্রাম সোনা নেওয়া হয়, সেটাই সোনার পুঁজি। উদাহরণ:

```
সোনা গ্রহণ:
রফিক        → ০১ জানু ২০২৫ → ১০০ গ্রাম  → প্রতি গ্রাম ৯৫,০০০ টাকা
জাহানারা    → ০৫ জানু ২০২৫ → ১৫০ গ্রাম  → প্রতি গ্রাম ৯৭,০০০ টাকা
সুমন        → ১০ জানু ২০২৫ →  ৫০ গ্রাম  → প্রতি গ্রাম ৯৬,০০০ টাকা
────────────────────────────────────────────────────
মোট সোনার পুঁজি                → ৩০০ গ্রাম
```

### ৬.৩ সোনা দেওয়া/বিক্রির হিসাব

```
সোনা প্রদান:
আনোয়ার  → ১২ জানু ২০২৫ → ৮০ গ্রাম  → প্রতি গ্রাম ৯৭,৫০০ টাকা
মিনা     → ১৫ জানু ২০২৫ → ৪০ গ্রাম  → প্রতি গ্রাম ৯৮,০০০ টাকা
────────────────────────────────────────────────────
মোট দেওয়া                      → ১২০ গ্রাম
```

### ৬.৪ সোনার স্থিতি

```
মোট পুঁজি (নেওয়া)  → ৩০০ গ্রাম
(-) দেওয়া হয়েছে   → ১২০ গ্রাম
─────────────────────────────
হাতে আছে           → ১৮০ গ্রাম ✅
```

> যদি হাতে থাকা গ্রাম শূন্যের নিচে যায়, তাহলে **লাল রঙে** দেখাবে।

### ৬.৫ সোনার লেনদেনে কী কী তথ্য থাকবে

প্রতিটি সোনার লেনদেনে:

| তথ্য | বাধ্যতামূলক? |
|---|---|
| ব্যক্তির নাম | ✅ হ্যাঁ |
| তারিখ ও সময় | ✅ হ্যাঁ |
| ওজন (গ্রাম, দশমিকসহ) | ✅ হ্যাঁ |
| প্রতি গ্রাম মূল্য (টাকা) | ❌ ঐচ্ছিক |
| মোট মূল্য (টাকা) | ❌ ঐচ্ছিক (auto calculate) |
| নোট/মন্তব্য | ❌ ঐচ্ছিক |

> **দ্রষ্টব্য:** সোনার টাকার হিসাব শুধু রেকর্ডের জন্য — এটা নগদ মূলধনে যোগ বা বিয়োগ হয় না।

## ৭. পরিচিতি ব্যবস্থাপনা (Person Management)

### ৭.১ ব্যক্তি কীভাবে চিহ্নিত হবে

প্রতিটি ব্যক্তি তার **ফোন নম্বর** দিয়ে চিহ্নিত হবে। একই ফোন নম্বরে দুইজন আলাদা ব্যক্তি যোগ করা যাবে পরিচয় বিভ্রান্তি এড়াতে।

একজন ব্যক্তি একই সাথে নগদ ও সোনা — উভয় লেনদেনেই থাকতে পারবেন। আলাদাভাবে সেট করতে হবে না; তার লেনদেনের ইতিহাস দেখলেই বোঝা যাবে।

### ৭.২ পরিচিতি তালিকায় কী দেখাবে

```
┌─────────────────────────────────────────────┐
│ 👤 রহিম সাহেব          01XXXXXXXXX          │
│    💵 পাবেন: ১,৫০,০০০ টাকা                  │
│    🥇 পাবেন: ৫০.২৫ গ্রাম                    │
└─────────────────────────────────────────────┘
```

প্রতিটি ব্যক্তির কার্ডে:
- নাম ও ফোন নম্বর
- নগদে কত পাবেন / কত দেবেন (যদি নগদ লেনদেন থাকে)
- সোনায় কত গ্রাম পাবেন / দেবেন (যদি সোনার লেনদেন থাকে)

### ৭.৩ একজন ব্যক্তির বিস্তারিত পাতায় কী থাকবে

ব্যক্তির নামে ট্যাপ করলে বিস্তারিত পাতা খুলবে:

**নগদ ট্যাব:**
```
মোট দিয়েছেন    : ২,০০,০০০ টাকা
ফেরত পেয়েছেন   :    ৫০,০০০ টাকা
─────────────────────────────
এখনো পাবেন      : ১,৫০,০০০ টাকা
```
নিচে সব লেনদেনের ইতিহাস তারিখ ও সময়সহ।

**সোনা ট্যাব:**
```
মোট দিয়েছেন    : ১০০.০০ গ্রাম
ফেরত নিয়েছেন   :   ০.০০ গ্রাম
─────────────────────────────
এখনো পাবেন      : ১০০.০০ গ্রাম
আনুমানিক মূল্য  : ৳ ৯,৫০,০০০
```

### ৭.৪ ব্যক্তি Delete করলে কী হবে

- ব্যক্তিকে Delete করা হলেও তার সব লেনদেনের ইতিহাস **থেকে যাবে**
- লেনদেনে সেই ব্যক্তির জায়গায় "মুছে ফেলা পরিচিতি" দেখাবে
- হিসাবের গণনায় তার লেনদেন **ঠিকঠাক count হবে**

## ৯. অতিরিক্ত হিসাব (Custom Category)

নগদ ও সোনা ছাড়াও যদি ভবিষ্যতে অন্য কোনো ধরনের হিসাব রাখতে চান (যেমন রুপা, জমি, মালামাল), সেটা নিজেই যোগ করা যাবে।

### ৯.১ কীভাবে যোগ করবেন

Settings → অন্যান্য হিসাব → নতুন যোগ করুন

- **হিসাবের নাম:** যেমন "রুপা"
- **একক:** যেমন "গ্রাম" বা "শতক" বা "পিস"

### ৯.২ কীভাবে কাজ করবে

নতুন category যোগ করলে:
- Dashboard-এ আলাদা একটি কার্ড তৈরি হবে
- লেনদেনে ওই category-র জন্য আলাদা ট্যাব আসবে
- পুঁজি ও হাতে আছে — দুটোই দেখাবে
- নেগেটিভ হলে লাল দেখাবে

## ১০. ফিল্টার ও অনুসন্ধান (Filter & Search)

### ১০.১ তারিখ অনুযায়ী ফিল্টার

লেনদেনের তালিকায় নিচের ফিল্টার থেকে বেছে নেওয়া যাবে:

| ফিল্টার | বিবরণ |
|---|---|
| **আজ** | শুধু আজকের লেনদেন |
| **সপ্তাহ** | এই সপ্তাহের লেনদেন |
| **মাস** | এই মাসের লেনদেন |
| **বছর** | এই বছরের লেনদেন |
| **কাস্টম** | নিজে তারিখ সীমা বেছে নিন |

### ১০.২ ব্যক্তি অনুযায়ী অনুসন্ধান

পরিচিতি তালিকায় নাম বা ফোন নম্বর দিয়ে খোঁজা যাবে।

### ১০.৩ ধরন অনুযায়ী ফিল্টার

পরিচিতি পাতায় ফিল্টার করা যাবে:
- **সবাই** — সব পরিচিতি
- **নগদ** — যাদের শুধু নগদ লেনদেন আছে
- **সোনা** — যাদের শুধু সোনার লেনদেন আছে
- **উভয়** — নগদ ও সোনা দুটোতেই আছেন যারা

## ১১. নিরাপত্তা ব্যবস্থা (Security)

### ১১.১ লগইন পদ্ধতি

অ্যাপে প্রবেশের জন্য:
1. **ফোন নম্বর দিয়ে OTP** — প্রথমবার লগইনের সময়
2. **ফিঙ্গারপ্রিন্ট / Face ID** — দ্রুত প্রবেশের জন্য
3. **৬ সংখ্যার PIN** — বিকল্প নিরাপত্তা

### ১১.২ ভুল PIN দিলে কী হবে

- টানা ৫ বার ভুল PIN দিলে **৩০ সেকেন্ডের জন্য** অ্যাপ লক হবে

### ১১.৩ একাধিক ডিভাইস

- একই ফোন নম্বরে যত ডিভাইস চাই লগইন করা যাবে
- একটি ডিভাইস থেকে লগআউট করলে বাকিগুলোতে প্রভাব পড়বে না

### ১১.৪ ডেটা সুরক্ষা

- Firebase-এর Security Rules ব্যবহার করা হবে
- শুধুমাত্র **আপনিই** আপনার ডেটা দেখতে ও পরিবর্তন করতে পারবেন
- অন্য কেউ কোনোভাবেই access পাবে না

---

## ১২. ডেটা সিঙ্ক্রোনাইজেশন (Data Sync)

### ১২.১ Local First পদ্ধতি

অ্যাপটি **"Local First"** পদ্ধতিতে কাজ করে:

```
আপনি এন্ট্রি দেন
      ↓
প্রথমে ফোনে সেভ হয় (সাথে সাথে)
      ↓
UI তাৎক্ষণিকভাবে আপডেট হয়
      ↓
Background-এ ক্লাউডে (Firebase) পাঠানো হয়
      ↓
ইন্টারনেট না থাকলে → পেন্ডিং থাকে
ইন্টারনেট আসলে → স্বয়ংক্রিয়ভাবে sync হয়
```

### ১২.২ দুইটি ডিভাইস একসাথে ব্যবহার করলে

- **নতুন এন্ট্রি:** UUID ব্যবহারের কারণে কোনো conflict হয় না
- **একই এন্ট্রি দুই ডিভাইসে Edit হলে:** যে এন্ট্রি সবশেষে পরিবর্তন হয়েছে সেটা জিতবে; পুরনো version সংরক্ষিত থাকবে
- **Delete:** Delete সবসময় প্রাধান্য পাবে

### ১২.৩ অফলাইনে কাজ

ইন্টারনেট ছাড়াও অ্যাপের সব কাজ চলবে — এন্ট্রি দেওয়া, দেখা, সম্পাদনা সব। ইন্টারনেট আসলে সব স্বয়ংক্রিয়ভাবে ক্লাউডে চলে যাবে।

## ১৩. Edit ও Delete নীতি

### ১৩.১ Edit করা

যেকোনো লেনদেনে ট্যাপ করে Edit করা যাবে। Edit করলে:
- আগের তথ্য ইতিহাসে (Audit Trail) সংরক্ষিত থাকবে
- নতুন তথ্য active হবে

### ১৩.২ Delete করা

লেনদেন Delete করলে:
- ডেটাবেজ থেকে সম্পূর্ণ মুছে যাবে না (Soft Delete)
- UI-তে দেখাবে না এবং হিসাবে গণনা হবেবিধা হবে না
- কিন্তু সার্ভারে থাকবে (নিরাপত্তার জন্য)

## ১৬. প্রযুক্তি স্ট্যাক (Technical Stack)

ডেভেলপারদের জন্য ব্যবহৃত প্রযুক্তির সংক্ষিপ্ত পরিচয়:

| স্তর | প্রযুক্তি | কারণ |
|---|---|---|
| **Framework** | Flutter | একটি codebase থেকে Android + iOS |
| **অনলাইন Database** | Firebase Firestore | Real-time sync, offline support |
| **অফলাইন Database** | Hive | ফোনে দ্রুত ও হালকা storage |
| **Authentication** | Firebase Auth | ফোন নম্বর OTP |
| **Biometric** | local_auth | Fingerprint / Face ID |
| **State Management** | Riverpod | বড় অ্যাপের জন্য নির্ভরযোগ্য |
| **Navigation** | GoRouter | Declarative routing |

### ১৬.১ Architecture (Clean Architecture)

```
┌─────────────────────────────────┐
│       PRESENTATION LAYER        │  ← Screens, Widgets, Providers
│  (UI জানে না data কোথা থেকে আসছে)│
├─────────────────────────────────┤
│         DOMAIN LAYER            │  ← Business Logic, Use Cases
│  (Business logic এখানে থাকে)    │
├─────────────────────────────────┤
│          DATA LAYER             │  ← Firebase, Hive, Repositories
│  (Data কোথায় থেকে আসবে)         │
└─────────────────────────────────┘
```

> **সুবিধা:** UI সম্পূর্ণ আলাদা থাকবে। আগামীকাল পুরো UI ভেঙে নতুন করে বানালেও Backend-এর একটি লাইনও পরিবর্তন করতে হবে না।

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Render Markdown
            const rawMarkdown = document.getElementById('raw-markdown').value;
            const contentDiv = document.getElementById('content');
            
            // Set marked options for better rendering
            marked.setOptions({
                gfm: true,
                breaks: true
            });
            
            // Render HTML using marked and sanitize with DOMPurify
            const rawHtml = marked.parse(rawMarkdown);
            contentDiv.innerHTML = DOMPurify.sanitize(rawHtml);

            // 2. Wrap sections for scroll animation
            const elementsToAnimate = contentDiv.querySelectorAll('h2, h3, p, ul, ol, table, blockquote, pre');
            elementsToAnimate.forEach(el => el.classList.add('fade-in-section'));

            // 3. Generate Table of Contents (TOC)
            const headings = contentDiv.querySelectorAll('h2');
            const toc = document.getElementById('toc');
            
            headings.forEach((heading, index) => {
                // Add ID to heading
                const id = 'section-' + index;
                heading.id = id;
                
                // Create link
                const link = document.createElement('a');
                link.href = '#' + id;
                link.className = 'toc-link block px-4 py-2.5 rounded-r-lg text-gray hover:text-gold';
                link.textContent = heading.textContent;
                link.dataset.target = id;
                
                toc.appendChild(link);
            });

            // 4. Scroll Spy (Highlight active TOC link)
            const tocLinks = document.querySelectorAll('.toc-link');
            const observerOptions = {
                root: null,
                rootMargin: '-15% 0px -85% 0px',
                threshold: 0
            };

            const headingObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        tocLinks.forEach(link => {
                            link.classList.remove('active');
                            if (link.dataset.target === entry.target.id) {
                                link.classList.add('active');
                                // Ensure active item is visible in sidebar scroll
                                link.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                            }
                        });
                    }
                });
            }, observerOptions);

            headings.forEach(h => headingObserver.observe(h));

            // 5. Fade In Animation Observer
            const fadeObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        fadeObserver.unobserve(entry.target);
                    }
                });
            }, { root: null, threshold: 0.1, rootMargin: '0px 0px -20px 0px' });

            elementsToAnimate.forEach(el => fadeObserver.observe(el));

            // 6. Mobile Menu Toggle
            const menuBtn = document.getElementById('menu-btn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            function toggleMenu() {
                const isOpen = !sidebar.classList.contains('-translate-x-full');
                if (isOpen) {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                    document.body.style.overflow = '';
                } else {
                    sidebar.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                    document.body.style.overflow = 'hidden';
                }
            }

            menuBtn.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);
            
            // Close sidebar when clicking a link on mobile
            tocLinks.forEach(link => {
                link.addEventListener('click', () => {
                    if(window.innerWidth < 768) {
                        toggleMenu();
                    }
                });
            });
        });
    </script>
